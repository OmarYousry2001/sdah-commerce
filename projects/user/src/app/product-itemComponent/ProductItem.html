<div class="card h-100">



    @if( this.Product.imagePath && this.Product.imagePath.length > 0)
    {
    <img [src]="urlImages+Product.imagePath" class="card-img-top" alt="Product image">

    }



    <div class="card-body">
        <!-- <div class="thumbnails mb-3">
            @for (item of Product.imagePath; track $index) {
            <img [src]="urlImages+item.imageName" alt="" class="thumbnail-img small-img">
            }

        </div> -->
        <h5 class="card-title">{{Product.name}}</h5>
        <p class="card-text">{{Product.description}}</p>
        <p class="price">
            <!-- <span class="old-price">{{Product.oldPrice|currency}}</span> -->
            {{Product.price | currency}}
        </p>
        <div class="rating mb-3">

            <i class="fa fa-star " style="color: rgb(243, 255, 82); font-size: 15px;"></i>
            <i class="fa fa-star " style="color: rgb(243, 255, 82); font-size: 15px;"></i>
            <i class="fa fa-star " style="color: rgb(243, 255, 82); font-size: 15px;"></i>
            <i class="fa fa-star " style="color: rgb(243, 255, 82); font-size: 15px;"></i>
        </div>

        <div class="d-flex justify-content-between align-items-start">
            <button (click)="SetBasketValue()" class="btn btn-dark">
                <i class="fa fa-shopping-cart"></i> إلى السلة
            </button>
            <button [routerLink]="['/productDetails',Product.id]" class="btn btn-success">
                <i class="fa fa-info-circle"></i>تفاصيل
            </button>
        </div>
    </div>
</div>
