
<div class="my-special-component">
<div class="d-flex justify-content-between  mb-5">
  <button class="btn btn-primary "  [routerLink]="['/admin']">الذهاب الي لوحه التحكم</button>
<button class="btn btn-primary"  [routerLink]="['/admin/addCategory']">اضافه</button>
</div>

<table class="table table-light table-striped table-hover ">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">الاسم</th>
      <th scope="col">إجراءات</th>
    </tr>
  </thead>
  <tbody>
    @if(categories)
    {
        @for (item of categories;  track $index) {
            <tr>
                <th>{{$index + 1}}</th>
                <td>{{item.name}}</td>

                <td>  <div class="btn-group" role="group">
                  <a [routerLink]="['/admin/addCategory' ,item.id]" class="btn btn-sm btn-primary me-2">    <i class="fas fa-edit"></i> تعديل</a>
                <button (click)="deleteCategory(item.id)" class="btn btn-sm btn-danger me-2">    <i class="fas fa-trash"></i> حذف</button>   </div></td>
           
            </tr>
        }

    }
    @else
    {
      <tr>
        <td colspan="3">لا توجد بيانات </td>
      </tr>
    }
 
 
  
  </tbody>
</table>






</div>
