<div class="my-special-component">
    <div class="d-flex justify-content-between mb-5">
        <button class="btn btn-primary" [routerLink]="['/admin']">
            الذهاب إلى لوحة التحكم
        </button>
    </div>

    <table class="table table-light table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">الاسم</th>
                <th scope="col">رقم الهاتف</th>
                <th scope="col">الرسالة</th>
                <th scope="col">تاريخ الإضافة</th>
                <th scope="col">إجراءات</th>
            </tr>
        </thead>
        <tbody>
            @if (comments) {
            @for (comment of comments; track $index) {
            <tr>
                <th>{{ $index + 1 }}</th>
                <td>
                    <span class="badge">{{ comment.name }}</span>
                </td>
                <td>{{ comment.phone }}</td>
                <td>{{ comment.message }}</td>
                <td>{{ comment.createdDateUtc | date: 'dd/MM/yyyy' }}</td>
                <td>
                    <div class="btn-group" role="group">
                        <button (click)="delete(comment.id)" class="btn btn-sm btn-danger me-2">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                </td>
            </tr>
            }
            } @else {
            <tr>
                <td colspan="6" class="text-center">لا توجد بيانات</td>
            </tr>
            }
        </tbody>
    </table>
</div>
